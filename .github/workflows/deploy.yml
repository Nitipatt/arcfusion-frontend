name: Deploy Frontend
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Repository to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "."
          target: "/opt/arcfusion/frontend"
          rm: true

      - name: Trigger Remote Docker Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/arcfusion
            mkdir -p frontend backend langgraph-service
            cp secrets/frontend.env frontend/.env || true
            cp secrets/backend.env backend/.env || true
            cp secrets/langgraph.env langgraph-service/.env || true
            docker compose up -d --build frontend
